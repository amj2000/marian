<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MARIAN — 안미정 Portfolio</title>

<!-- Pretendard (Apple-feel KR/Latin sans) -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<!-- Editorial serifs -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet" />

<style>
:root {
  --display: "Helvetica Neue", "Pretendard Variable", Pretendard, sans-serif;
  --display-kr: "Pretendard Variable", Pretendard, sans-serif;
  --serif: "Cormorant Garamond", serif;
  --serif-kr: "Nanum Myeongjo", serif;
  --body: "Pretendard Variable", Pretendard, "Helvetica Neue", sans-serif;
  --accent: #a98545;

  /* parallax + motion intensity (set by tweaks) */
  --par: 1;
}

/* ============ MOODS ============ */
[data-mood="light"] {
  --bg: #f3f1ec;
  --bg2: #ffffff;
  --bg-section: #ece9e3;
  --ink: #16140f;
  --ink-soft: #3b382f;
  --muted: #837d70;
  --line: rgba(20,18,12,0.13);
  --hero-veil: linear-gradient(to top, rgba(0,0,0,0.34) 0%, rgba(0,0,0,0.04) 38%, rgba(0,0,0,0.10) 100%);
  --img-base: grayscale(1) contrast(0.96) brightness(0.985);
  --img-hover: none;
  --hero-blend: difference;
  --hero-type: #ffffff;
}
[data-mood="dark"] {
  --bg: #0b0b0c;
  --bg2: #141416;
  --bg-section: #08080a;
  --ink: #f2efe9;
  --ink-soft: #cbc7be;
  --muted: #8d887d;
  --line: rgba(255,255,255,0.15);
  --hero-veil: linear-gradient(to top, rgba(0,0,0,0.70) 0%, rgba(0,0,0,0.12) 42%, rgba(0,0,0,0.40) 100%);
  --img-base: grayscale(1) contrast(1.02) brightness(0.92);
  --img-hover: none;
  --hero-blend: normal;
  --hero-type: #f4f1ea;
}
[data-mood="warm"] {
  --bg: #ece2d3;
  --bg2: #f6efe3;
  --bg-section: #e3d7c4;
  --ink: #2a2015;
  --ink-soft: #4d4030;
  --muted: #877a64;
  --line: rgba(70,48,22,0.16);
  --hero-veil: linear-gradient(to top, rgba(40,26,10,0.40) 0%, rgba(40,26,10,0.04) 40%, rgba(40,26,10,0.14) 100%);
  --img-base: grayscale(1) sepia(0.34) contrast(0.95) brightness(1.0);
  --img-hover: none;
  --hero-blend: normal;
  --hero-type: #f7efe2;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--body);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
  transition: background 0.7s ease, color 0.7s ease;
}
::selection { background: var(--accent); color: #fff; }

/* font scheme toggles */
[data-font="serif"] { --display: var(--serif); --display-kr: var(--serif-kr); }
[data-font="sans"]  { --display: "Helvetica Neue", "Pretendard Variable", Pretendard, sans-serif; --display-kr: "Pretendard Variable", Pretendard, sans-serif; }
/* mixed = default :root */

a { color: inherit; text-decoration: none; }

.eyebrow {
  font-family: var(--body);
  font-size: clamp(11px, 0.78vw, 13px);
  letter-spacing: 0.34em;
  text-transform: uppercase;
  font-weight: 500;
  color: var(--muted);
}

/* ===================== NAV ===================== */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 60;
  display: flex; align-items: center; justify-content: space-between;
  padding: 26px clamp(20px, 5vw, 64px);
  transition: background 0.5s ease, padding 0.5s ease, backdrop-filter 0.5s ease;
  mix-blend-mode: var(--nav-blend, normal);
}
.nav.scrolled {
  background: color-mix(in srgb, var(--bg) 78%, transparent);
  backdrop-filter: blur(18px) saturate(1.2);
  padding-top: 16px; padding-bottom: 16px;
  mix-blend-mode: normal;
  border-bottom: 1px solid var(--line);
}
.nav .brand {
  font-family: var(--display);
  font-weight: 600; font-size: 19px; letter-spacing: 0.28em;
  color: var(--nav-ink, #fff);
}
.nav.scrolled .brand { color: var(--ink); }
.nav .links { display: flex; gap: clamp(20px, 3vw, 44px); align-items: center; }
.nav .links a {
  font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase;
  font-weight: 500; color: var(--nav-ink, #fff); opacity: 0.92;
  position: relative; padding: 4px 0;
}
.nav.scrolled .links a { color: var(--ink-soft); }
.nav .links a::after {
  content: ""; position: absolute; left: 0; bottom: -2px; height: 1px; width: 0;
  background: currentColor; transition: width 0.4s cubic-bezier(.2,.8,.2,1);
}
.nav .links a:hover::after { width: 100%; }
@media (max-width: 640px){ .nav .links a:not(.cta){ display:none; } }

/* ===================== HERO ===================== */
.hero { position: relative; height: 100svh; width: 100%; overflow: hidden; }
.hero__media { position: absolute; inset: -8% 0 -8% 0; will-change: transform; }
.hero__media img {
  width: 100%; height: 100%; object-fit: cover; object-position: 58% 50%;
  filter: var(--img-base);
}
.hero__veil { position: absolute; inset: 0; background: var(--hero-veil); pointer-events: none; }
.hero__inner {
  position: absolute; inset: 0; z-index: 3;
  display: flex; flex-direction: column; justify-content: space-between;
  padding: clamp(96px, 12vh, 150px) clamp(20px, 5vw, 64px) clamp(40px, 6vh, 64px);
}
.hero__top { max-width: 60ch; }
.hero__top .eyebrow { color: color-mix(in srgb, var(--hero-type) 80%, transparent); }
.hero__kr {
  margin-top: 14px;
  font-family: var(--serif-kr);
  font-size: clamp(20px, 2.4vw, 30px);
  font-weight: 400; line-height: 1.5; letter-spacing: 0.02em;
  color: color-mix(in srgb, var(--hero-type) 94%, transparent);
  max-width: 22ch; text-wrap: balance;
}
.hero__bottom { display: flex; flex-direction: column; gap: clamp(14px, 2vh, 22px); }
.hero__tagline {
  display: flex; align-items: center; gap: 18px;
  color: color-mix(in srgb, var(--hero-type) 88%, transparent);
  font-family: var(--serif); font-style: italic;
  font-size: clamp(15px, 1.5vw, 22px); letter-spacing: 0.01em;
}
.hero__tagline .rule { height: 1px; width: clamp(40px, 6vw, 90px); background: currentColor; opacity: 0.6; }
.hero__word {
  font-family: var(--display);
  font-weight: 600;
  font-size: clamp(64px, 16vw, 248px);
  line-height: 0.86;
  letter-spacing: 0.02em;
  color: var(--hero-type);
  mix-blend-mode: var(--hero-blend);
  display: flex; gap: clamp(2px, 0.5vw, 10px);
}
.hero__word span { display: inline-block; transform: translateY(110%); }
.hero.in .hero__word span { transform: translateY(0); transition: transform 1.1s cubic-bezier(.16,1,.3,1); }
.hero__word span:nth-child(1){ transition-delay: .05s;} 
.hero__word span:nth-child(2){ transition-delay: .12s;}
.hero__word span:nth-child(3){ transition-delay: .19s;}
.hero__word span:nth-child(4){ transition-delay: .26s;}
.hero__word span:nth-child(5){ transition-delay: .33s;}
.hero__word span:nth-child(6){ transition-delay: .40s;}
[data-hero="center"] .hero__inner { align-items: center; text-align: center; }
[data-hero="center"] .hero__top { max-width: none; display: flex; flex-direction: column; align-items: center; }
[data-hero="center"] .hero__kr { max-width: 24ch; }
[data-hero="center"] .hero__bottom { align-items: center; }
[data-hero="center"] .hero__word { justify-content: center; }
.scrollcue {
  position: absolute; right: clamp(20px, 5vw, 64px); bottom: clamp(40px,6vh,64px); z-index:4;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  color: color-mix(in srgb, var(--hero-type) 78%, transparent);
}
.scrollcue .label { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; writing-mode: vertical-rl; }
.scrollcue .bar { width: 1px; height: 54px; background: currentColor; opacity: 0.5; transform-origin: top; animation: cue 2.4s ease-in-out infinite; }
@keyframes cue { 0%,100%{ transform: scaleY(0.3); opacity:.2;} 50%{ transform: scaleY(1); opacity:.7;} }

/* ===================== reveal ===================== */
.reveal { opacity: 0; transform: translateY(calc(34px * var(--par))); transition: opacity 1.1s cubic-bezier(.16,1,.3,1), transform 1.1s cubic-bezier(.16,1,.3,1); }
.reveal.in { opacity: 1; transform: none; }
.reveal.d1 { transition-delay: .08s; }
.reveal.d2 { transition-delay: .16s; }
.reveal.d3 { transition-delay: .24s; }

/* ===================== ABOUT ===================== */
.section { padding: clamp(90px, 16vh, 200px) clamp(20px, 5vw, 64px); position: relative; }
.about { background: var(--bg); }
.about__grid {
  max-width: 1280px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1fr; gap: clamp(36px, 6vw, 96px);
  align-items: center;
}
.about__portrait { position: relative; aspect-ratio: 3/4; overflow: hidden; }
.about__portrait img { width: 100%; height: 100%; object-fit: cover; filter: var(--img-base); transition: filter 1s ease, transform 1.6s cubic-bezier(.2,.8,.2,1); will-change: transform; }
[data-reveal-color="true"] .about__portrait:hover img { filter: var(--img-hover); transform: scale(1.04); }
.about__portrait .tag { position: absolute; left: 14px; bottom: 12px; color: #f4f1ea; font-family: var(--serif); font-style: italic; font-size: 15px; mix-blend-mode: difference; }
.about__label { display: flex; align-items: center; gap: 16px; margin-bottom: 30px; }
.about__label .ix { font-family: var(--serif); font-style: italic; color: var(--accent); font-size: 20px; }
.about__h {
  font-family: var(--display-kr);
  font-weight: 600;
  font-size: clamp(28px, 3.4vw, 50px);
  line-height: 1.22; letter-spacing: -0.01em; color: var(--ink);
  text-wrap: balance;
}
.about__h .em { font-family: var(--serif); font-style: italic; font-weight: 500; color: var(--accent); }
.about__p {
  margin-top: 26px; font-size: clamp(15px, 1.15vw, 18px); line-height: 1.92;
  color: var(--ink-soft); max-width: 46ch; font-weight: 400;
}
.about__p + .about__p { margin-top: 18px; }
.about__meta { margin-top: 40px; display: grid; grid-template-columns: repeat(2, max-content); gap: 14px 56px; }
.about__meta .k { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.about__meta .v { font-size: 15px; color: var(--ink); line-height: 1.6; }
@media (max-width: 860px){ .about__grid { grid-template-columns: 1fr; gap: 44px; } .about__portrait{ max-width: 460px; } }

/* ===================== MARQUEE strip ===================== */
.strip { padding: clamp(28px,5vh,56px) 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); overflow: hidden; background: var(--bg-section); transition: background .7s ease; }
.strip__track { display: flex; gap: 64px; white-space: nowrap; width: max-content; animation: slide 38s linear infinite; }
.strip__track span { font-family: var(--serif); font-style: italic; font-size: clamp(28px, 4.6vw, 64px); color: var(--ink); opacity: 0.86; }
.strip__track .dot { color: var(--accent); font-style: normal; }
@keyframes slide { to { transform: translateX(-50%); } }

/* ===================== GALLERY ===================== */
.gallery { background: var(--bg-section); transition: background .7s ease; }
.gallery__head { max-width: 1280px; margin: 0 auto clamp(48px, 8vh, 96px); display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; flex-wrap: wrap; }
.gallery__head h2 { font-family: var(--display); font-weight: 600; font-size: clamp(40px, 8vw, 120px); line-height: 0.92; letter-spacing: -0.01em; }
.gallery__head .sub { font-family: var(--serif-kr); font-size: clamp(15px,1.3vw,19px); color: var(--muted); max-width: 26ch; text-align: right; line-height:1.6; }
.gallery__grid { max-width: 1280px; margin: 0 auto; display: flex; flex-direction: column; gap: clamp(80px, 14vh, 180px); }
.figure { position: relative; overflow: hidden; }
.figure__media { overflow: hidden; position: relative; }
.figure__media img { width: 100%; display: block; filter: var(--img-base); transition: filter 1s ease, transform 1.8s cubic-bezier(.2,.8,.2,1); will-change: transform; }
[data-reveal-color="true"] .figure:hover .figure__media img { filter: var(--img-hover); transform: scale(1.045); }
.figure__cap { display: flex; justify-content: space-between; align-items: baseline; margin-top: 18px; gap: 20px; }
.figure__cap .t { font-family: var(--serif); font-style: italic; font-size: clamp(18px,1.7vw,26px); color: var(--ink); }
.figure__cap .t .num { font-style: normal; color: var(--accent); font-family: var(--body); font-size: 0.6em; letter-spacing: .2em; margin-right: 12px; vertical-align: middle; }
.figure__cap .y { font-size: 12px; letter-spacing: 0.2em; color: var(--muted); }
/* staggered / aligned layouts */
[data-layout="stagger"] .figure:nth-child(odd) { width: min(64%, 820px); margin-right: auto; }
[data-layout="stagger"] .figure:nth-child(even) { width: min(54%, 700px); margin-left: auto; }
[data-layout="grid"] .figure { width: 100%; }
@media (max-width: 760px){ [data-layout="stagger"] .figure { width: 100% !important; } }

/* ===================== CONTACT ===================== */
.contact { background: var(--bg); padding-bottom: 0; }
.contact__inner { max-width: 1280px; margin: 0 auto; text-align: center; }
.contact .eyebrow { display: block; margin-bottom: 26px; }
.contact__big {
  font-family: var(--display); font-weight: 600;
  font-size: clamp(34px, 6vw, 92px); line-height: 1.02; letter-spacing: -0.01em;
  color: var(--ink); text-wrap: balance;
}
.contact__big .em { font-family: var(--serif); font-style: italic; font-weight: 500; color: var(--accent); }
.contact__row { margin-top: clamp(40px, 7vh, 72px); display: flex; justify-content: center; gap: clamp(28px, 6vw, 80px); flex-wrap: wrap; }
.contact__row .item { text-align: center; }
.contact__row .k { font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.contact__row .v { font-family: var(--serif); font-size: clamp(18px, 1.8vw, 26px); color: var(--ink); transition: color .3s; }
.contact__row a.v:hover { color: var(--accent); }
.footer { margin-top: clamp(64px, 12vh, 130px); border-top: 1px solid var(--line); padding: 30px clamp(20px,5vw,64px); display:flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 14px; }
.footer .brand { font-family: var(--display); font-weight: 600; letter-spacing: 0.28em; font-size: 16px; }
.footer .small { font-size: 12px; letter-spacing: 0.12em; color: var(--muted); }

#root-app { min-height: 100vh; }

/* tweak panel host fallbacks */
.tw-hidden { display: none !important; }
</style>
</head>
